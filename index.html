<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Induk Digital - SMP Frater Mamasa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 text-slate-800">

    <div id="app"></div>

    <script>
        const LOGO_URL = "https://lh3.googleusercontent.com/d/1cFZlURW-mPBPhb5qgQAMwxvI-PISCqkB";
        
        // Data siswa tersimpan di memori browser
        let state = {
            isLoggedIn: false,
            role: null,
            currentMenu: 'dashboard',
            siswa: [
                { id: 1, nama: "Budi Santoso", nis: "1001", kelas: "VII-A" },
                { id: 2, nama: "Siti Aminah", nis: "1002", kelas: "VIII-B" }
            ]
        };

        function renderApp() {
            const app = document.getElementById('app');
            
            if (!state.isLoggedIn) {
                app.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-slate-900 px-4">
                        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
                            <img src="${LOGO_URL}" class="mx-auto h-32 mb-6 object-contain">
                            <h2 class="text-2xl font-bold mb-6 text-slate-800">Login Sistem</h2>
                            <form onsubmit="handleLogin(event)">
                                <input id="loginPassword" type="password" placeholder="Masukkan Password" required class="w-full p-3 border rounded-lg mb-4 outline-none focus:ring-2 focus:ring-blue-600">
                                <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white py-3 rounded-lg font-bold transition">MASUK</button>
                            </form>
                        </div>
                    </div>
                `;
            } else {
                app.innerHTML = `
                    <div class="flex h-screen overflow-hidden">
                        <aside class="w-64 bg-slate-900 text-white p-6 hidden md:flex flex-col shadow-lg">
                            <div class="bg-white p-2 rounded-lg mb-6">
                                <img src="${LOGO_URL}" class="h-20 mx-auto object-contain">
                            </div>
                            <h1 class="text-center font-bold mb-8 text-sm">SMP FRATER MAMASA</h1>
                            <nav class="space-y-4">
                                <button onclick="navigateTo('dashboard')" class="block w-full text-left hover:text-blue-400 p-2"><i class="fa-solid fa-house mr-2"></i> Dashboard</button>
                                <button onclick="navigateTo('siswa')" class="block w-full text-left hover:text-blue-400 p-2"><i class="fa-solid fa-users mr-2"></i> Data Siswa</button>
                                <button onclick="handleLogout()" class="block w-full text-left text-red-400 mt-10 p-2"><i class="fa-solid fa-right-from-bracket mr-2"></i> Logout</button>
                            </nav>
                        </aside>

                        <main class="flex-1 p-8 overflow-y-auto">
                            <div class="bg-white p-8 rounded-xl border shadow-sm">
                                ${state.currentMenu === 'dashboard' ? `
                                    <div class="flex flex-col items-center text-center">
                                        <img src="${LOGO_URL}" class="h-32 mb-6 object-contain">
                                        <h2 class="text-3xl font-bold text-slate-800">Selamat Datang</h2>
                                        <div class="mt-6 p-4 bg-slate-50 border rounded-lg w-full max-w-lg">
                                            <p class="font-bold text-blue-800">Randanan Desa Buntubuda, Kec. Mamasa, Kab. Mamasa</p>
                                        </div>
                                    </div>
                                ` : `
                                    <div class="flex justify-between items-center mb-6">
                                        <h2 class="text-2xl font-bold">Data Siswa</h2>
                                        ${state.role === 'admin' ? '<button onclick="tambahSiswa()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700"><i class="fa-solid fa-plus mr-2"></i>Tambah Siswa</button>' : ''}
                                    </div>
                                    <table class="w-full text-left border-collapse">
                                        <thead><tr class="border-b bg-slate-50"><th class="p-3">NIS</th><th class="p-3">Nama</th><th class="p-3">Kelas</th><th class="p-3">Aksi</th></tr></thead>
                                        <tbody>
                                            ${state.siswa.map(s => `
                                                <tr class="border-b hover:bg-slate-50">
                                                    <td class="p-3">${s.nis}</td>
                                                    <td class="p-3">${s.nama}</td>
                                                    <td class="p-3">${s.kelas}</td>
                                                    <td class="p-3">${state.role === 'admin' ? '<button class="text-red-600 hover:text-red-800"><i class="fa-solid fa-trash"></i></button>' : '-'}</td>
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                    </table>
                                `}
                            </div>
                        </main>
                    </div>
                `;
            }
        }

        window.tambahSiswa = function() {
            const nama = prompt("Nama Siswa:");
            if (nama) {
                state.siswa.push({ id: Date.now(), nama: nama, nis: "New", kelas: "VII" });
                renderApp();
            }
        };

        window.handleLogin = function(e) {
            e.preventDefault();
            const password = document.getElementById('loginPassword').value;
            if (password === 'adminfrms') {
                state.isLoggedIn = true;
                state.role = 'admin';
                renderApp();
            } else if (password === 'user123') {
                state.isLoggedIn = true;
                state.role = 'user';
                renderApp();
            } else {
                alert('Password salah!');
            }
        };

        window.handleLogout = () => { state.isLoggedIn = false; renderApp(); };
        window.navigateTo = (m) => { state.currentMenu = m; renderApp(); };

        renderApp();
    </script>
</body>
</html>
