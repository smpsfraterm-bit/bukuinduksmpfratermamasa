    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

            background-color: #f8fafc; 
        }
        
        @media print {
            body * { 
                visibility: hidden; 
            }
            #print-area, #print-area * { 
                visibility: visible; 
            }
            #print-area { 
                position: absolute; 
                left: 0; 
                top: 0; 
                width: 100%; 
                border: none !important; 
                box-shadow: none !important; 
                background: white;
                color: black;
            }
            #sidebar, header, button, .print-hide, .no-print { 
                display: none !important; 
            }
        }
    </style>
</head>
<body class="text-gray-800 antialiased overflow-hidden bg-slate-50">

    <div id="app" class="w-full h-screen flex overflow-hidden"></div>
    <div id="notification-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>
    <div id="modal-container"></div>

    <script type="module">

        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi resmi SMP Frater Mamasa
        const firebaseConfig = {
            apiKey: "AIzaSyCjmu4hpZXYbeyCAwDgYDFnTm8DAMGbyyg",
            authDomain: "buku-induk-smp-frater-mamasa.firebaseapp.com",
            projectId: "buku-induk-smp-frater-mamasa",
            storageBucket: "buku-induk-smp-frater-mamasa.firebasestorage.app",
            messagingSenderId: "494069572524",
            appId: "1:494069572524:web:d67bc12d51e51d0db01009",
            measurementId: "G-F28XG4HSLH"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'buku-induk-sekolah';
        let firebaseUser = null;
        let isSyncing = false;

        const defaultState = {
            isLoggedIn: false,
            currentUser: null,
            currentView: 'dashboard',
            siswa: [
                { id: 1, nis: '2324001', nama: 'Andi Pratama', kelas: 'VII A', tempat: 'Mamasa', tglLahir: '2011-05-12', jk: 'L', alamat: 'Jl. Pendidikan No. 1' },
                { id: 2, nis: '2324002', nama: 'Budi Santoso', kelas: 'VII B', tempat: 'Makassar', tglLahir: '2010-11-23', jk: 'L', alamat: 'Jl. Perintis' },
                { id: 3, nis: '2324003', nama: 'Citra Lestari', kelas: 'VII A', tempat: 'Mamasa', tglLahir: '2011-01-05', jk: 'P', alamat: 'Jl. Poros Mamasa' },
                { id: 4, nis: '2324004', nama: 'Dinda Aulia', kelas: 'VII C', tempat: 'Polewali', tglLahir: '2011-08-17', jk: 'P', alamat: 'Jl. Kartini' }
            ],
            nilai: [
                { id: 1, idSiswa: 1, mapel: 'Matematika', tugas: 85, uts: 80, uas: 82, akhir: 82.10 },
                { id: 2, idSiswa: 2, mapel: 'Matematika', tugas: 70, uts: 75, uas: 80, akhir: 75.50 },
                { id: 3, idSiswa: 3, mapel: 'Matematika', tugas: 90, uts: 88, uas: 92, akhir: 90.20 }
            ],
            orangTua: [
                { id: 1, idSiswa: 1, namaAyah: 'Herman Pratama', pekerjaanAyah: 'PNS', namaIbu: 'Siti Aminah', pekerjaanIbu: 'IRT', telp: '081234567890' },
                { id: 2, idSiswa: 2, namaAyah: 'Joko Santoso', pekerjaanAyah: 'Wiraswasta', namaIbu: 'Rini Astuti', pekerjaanIbu: 'Guru', telp: '082198765432' }
            ],
            mapel: ['Matematika', 'Bahasa Indonesia', 'Bahasa Inggris', 'IPA', 'IPS', 'Pendidikan Agama', 'PPKn', 'Seni Budaya', 'PJOK'],
            kelas: ['VII A', 'VII B', 'VII C', 'VIII A', 'VIII B', 'IX A', 'IX B']
        };

        let state = JSON.parse(JSON.stringify(defaultState));
        let searchKeyword = '';
        let filterKelasValue = '';

        async function initAuthentication() {
            // Segera render layar agar pengguna tidak melihat layar putih kosong
            renderApp();

            try {
                let userCredential;
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        userCredential = await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (tokenError) {
                        console.warn("Masuk dengan token khusus gagal, dialihkan ke masuk anonim:", tokenError);
                        userCredential = await signInAnonymously(auth);
                    }
                } else {
                    userCredential = await signInAnonymously(auth);
                }
                firebaseUser = userCredential.user;
                loadData();
            } catch (error) {
                console.error("Firebase Authentication Error: ", error);
                showNotification("Gagal terhubung ke Cloud. Berjalan dalam mode lokal.", "error");
            }
        }

        function loadData() {
            if (!firebaseUser) return;
            const docRef = doc(db, 'artifacts', appId, 'users', firebaseUser.uid, 'bukuInduk', 'data');
            
            onSnapshot(docRef, (docSnap) => {
                isSyncing = true;
                if (docSnap.exists()) {
                    const savedData = docSnap.data();
                    state.siswa = savedData.siswa || [];
                    state.nilai = savedData.nilai || [];
                    state.orangTua = savedData.orangTua || [];
                    state.mapel = savedData.mapel || defaultState.mapel;
                    state.kelas = savedData.kelas || defaultState.kelas;
                } else {
                    saveData();
                }
                isSyncing = false;
                
                // Render ulang konten jika pengguna dalam keadaan login
                if (state.isLoggedIn) {
                    renderViewContent();
                }
            }, (error) => {
                console.error("Firebase Read Error: ", error);
                isSyncing = false;
            });
        }

        async function saveData() {
            if (!firebaseUser) return;
            
            // Jaminan keamanan tambahan: cegah penyimpanan ke Cloud jika pengguna adalah non-admin (Read-Only)
            if (state.currentUser && !state.currentUser.canEdit) {
                console.warn("Akses Ditolak: Hak akses pengguna saat ini bersifat Lihat-Saja.");
                return;
            }

            const dataToSave = {
                siswa: state.siswa,
                nilai: state.nilai,
                orangTua: state.orangTua,
                mapel: state.mapel,
                kelas: state.kelas
            };
            
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', firebaseUser.uid, 'bukuInduk', 'data');
                await setDoc(docRef, dataToSave);
            } catch (error) {
                console.error("Firebase Save Error: ", error);
                showNotification("Gagal mengunggah perubahan ke Cloud", "error");
            }
        }

        let chartInstance = null;

        function showNotification(message, type = 'success') {
            const container = document.getElementById('notification-container');
            if (!container) return;
            const notif = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-600' : 'bg-red-600';
            notif.className = `${bgColor} text-white px-6 py-3 rounded-xl shadow-xl flex items-center space-x-3 transition-all duration-300 transform translate-y-2 opacity-0`;
            notif.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> <span class="font-medium text-sm">${message}</span>`;
            
            container.appendChild(notif);
            setTimeout(() => {
                notif.classList.remove('opacity-0', 'translate-y-2');
            }, 50);
            
            setTimeout(() => {
                notif.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => notif.remove(), 300);
            }, 3500);
        }

        function formatAngka(angka) {
            return parseFloat(angka).toFixed(2);
        }

        window.handleLogin = function(event) {
            event.preventDefault();
            const password = document.getElementById('password').value;

            if (password === 'adminfrms') {
                state.isLoggedIn = true;
                state.currentUser = { username: 'Administrator', role: 'Admin', canEdit: true };
                state.currentView = 'dashboard';
                renderApp();
                showNotification("Akses Admin Aktif. Mode Sunting Penuh Diizinkan!");
            } else if (password === 'user123') {
                state.isLoggedIn = true;
                state.currentUser = { username: 'User Pengamat', role: 'User (Tamu)', canEdit: false };
                state.currentView = 'dashboard';
                renderApp();
                showNotification("Akses User Aktif. Aplikasi berjalan dalam mode Lihat-Saja (Read-Only).", "success");
            } else {
                showNotification("Password salah! Silakan gunakan password 'adminfrms' atau 'user123'.", "error");
            }
        };

        window.handleLogout = function() {
            state.isLoggedIn = false;
            state.currentUser = null;
            state.currentView = 'dashboard';
            renderApp();
            showNotification("Anda telah keluar dari sistem.");
        };

        window.navigateTo = function(viewName) {
            state.currentView = viewName;
            searchKeyword = '';
            filterKelasValue = '';
            renderViewContent();
            
            // Highlight active sidebar
            document.querySelectorAll('.sidebar-item').forEach(el => {
                el.classList.remove('border-l-4', 'border-blue-500', 'bg-gray-800', 'text-white');
                el.classList.add('text-gray-300');
            });
            const activeEl = document.getElementById(`nav-${viewName}`);
            if(activeEl) {
                activeEl.classList.add('border-l-4', 'border-blue-500', 'bg-gray-800', 'text-white');
                activeEl.classList.remove('text-gray-300');
            }
            
            // Auto close mobile sidebar
            const mSidebar = document.getElementById('sidebar');
            if (mSidebar && window.innerWidth < 768) {
                mSidebar.classList.add('hidden');
            }
        };

        function renderApp() {
            const appEl = document.getElementById('app');
            if (!state.isLoggedIn) {
                appEl.innerHTML = `
                    <div class="w-full flex items-center justify-center bg-slate-100 px-4">
                        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
                            <div class="text-center mb-8">
                                <img src="logo_sekolah.png" onerror="this.src='https://placehold.co/100x100/3b82f6/ffffff?text=SMPF'" alt="Logo SMP Frater Mamasa" class="h-24 mx-auto mb-4 object-contain">
                                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Buku Induk Digital</h1>
                                <p class="text-sm text-slate-500 mt-1">SMP Frater Mamasa</p>
                            </div>
                            <form id="login-form" onsubmit="handleLogin(event)">
                                <div class="mb-6">
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-1.5">Password Aplikasi</label>
                                    <div class="relative">
                                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none"><i class="fas fa-lock text-slate-400"></i></div>
                                        <input type="password" id="password" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm" placeholder="Masukkan password" required>
                                    </div>
                                </div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-xl shadow-md transition-colors text-sm">
                                    Masuk ke Aplikasi
                                </button>
                            </form>
                        </div>
                    </div>
                `;
            } else {
                appEl.innerHTML = `
                    <!-- Sidebar -->
                    <aside id="sidebar" class="bg-slate-900 text-slate-100 w-64 flex-shrink-0 hidden md:flex flex-col h-full z-20 shadow-xl border-r border-slate-800 transition-all duration-300 absolute md:relative">
                        <div class="h-16 flex items-center px-6 border-b border-slate-800 bg-slate-900 flex-shrink-0">
                            <img src="logo_sekolah.png" onerror="this.src='https://placehold.co/40x40/3b82f6/ffffff?text=F'" alt="Logo" class="h-9 w-9 object-contain mr-3 bg-white rounded-xl p-1">
                            <span class="text-xs font-bold tracking-wider uppercase text-slate-200 leading-none">SMP FRATER<br><span class="text-[10px] text-blue-400 font-medium">MAMASA</span></span>
                            <button onclick="document.getElementById('sidebar').classList.add('hidden')" class="md:hidden ml-auto text-slate-400 hover:text-white"><i class="fas fa-times"></i></button>
                        </div>
                        <nav class="flex-1 overflow-y-auto py-4">
                            <ul class="space-y-1">
                                <li>
                                    <a href="#" id="nav-dashboard" onclick="navigateTo('dashboard')" class="sidebar-item flex items-center px-6 py-3 text-white border-l-4 border-blue-500 bg-gray-800 hover:text-white transition-colors text-sm font-medium">
                                        <i class="fas fa-chart-line w-5 mr-3 text-blue-400"></i> Dashboard
                                    </a>
                                </li>
                                <li class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider mt-4 border-t border-slate-800 pt-4">Data Buku Induk</li>
                                <li>
                                    <a href="#" id="nav-datasiswa" onclick="navigateTo('datasiswa')" class="sidebar-item flex items-center px-6 py-3 text-slate-300 hover:text-white hover:bg-slate-800 transition-colors text-sm">
                                        <i class="fas fa-user-graduate w-5 mr-3 text-blue-400"></i> Data Siswa
                                    </a>
                                </li>
                                <li>
                                    <a href="#" id="nav-dataortu" onclick="navigateTo('dataortu')" class="sidebar-item flex items-center px-6 py-3 text-slate-300 hover:text-white hover:bg-slate-800 transition-colors text-sm">
                                        <i class="fas fa-users w-5 mr-3 text-blue-400"></i> Orang Tua / Wali
                                    </a>
                                </li>
                                <li>
                                    <a href="#" id="nav-dataakademik" onclick="navigateTo('dataakademik')" class="sidebar-item flex items-center px-6 py-3 text-slate-300 hover:text-white hover:bg-slate-800 transition-colors text-sm">
                                        <i class="fas fa-school w-5 mr-3 text-blue-400"></i> Struktur Kelas & Mapel
                                    </a>
                                </li>
                                <li class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider mt-4 border-t border-slate-800 pt-4">Akademik</li>
                                <li>
                                    <a href="#" id="nav-inputnilai" onclick="navigateTo('inputnilai')" class="sidebar-item flex items-center px-6 py-3 text-slate-300 hover:text-white hover:bg-slate-800 transition-colors text-sm">
                                        <i class="fas fa-edit w-5 mr-3 text-blue-400"></i> Input Nilai Siswa
                                    </a>
                                </li>
                                <li>
                                    <a href="#" id="nav-laporan" onclick="navigateTo('laporan')" class="sidebar-item flex items-center px-6 py-3 text-slate-300 hover:text-white hover:bg-slate-800 transition-colors text-sm">
                                        <i class="fas fa-file-invoice w-5 mr-3 text-blue-400"></i> Laporan & Cetak
                                    </a>
                                </li>
                            </ul>
                        </nav>
                        <div class="p-4 border-t border-slate-800 bg-slate-950 flex-shrink-0">
                            <div class="flex items-center">
                                <div class="w-9 h-9 rounded-xl bg-blue-600 flex items-center justify-center text-sm font-bold text-white shadow-md">
                                    ${state.currentUser.username.charAt(0).toUpperCase()}
                                </div>
                                <div class="ml-3 overflow-hidden">
                                    <p class="text-xs font-bold text-slate-200 truncate">${state.currentUser.username}</p>
                                    <p class="text-[10px] text-blue-400 font-medium">${state.currentUser.role}</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    <!-- Main Content Wrapper -->
                    <div class="flex-1 flex flex-col min-w-0 h-full overflow-hidden">
                        <!-- Topbar -->
                        <header class="h-16 bg-white border-b border-slate-100 flex items-center justify-between px-6 z-10 flex-shrink-0">
                            <div class="flex items-center">
                                <button onclick="document.getElementById('sidebar').classList.toggle('hidden')" class="md:hidden text-slate-600 hover:text-slate-800 mr-4">
                                    <i class="fas fa-bars text-xl"></i>
                                </button>
                                <h2 id="page-title" class="text-lg font-bold text-slate-800 tracking-tight"></h2>
                            </div>
                            <div class="flex items-center space-x-4">
                                ${state.currentUser.canEdit ? `
                                <span class="hidden sm:inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-blue-50 text-blue-700">
                                    <i class="fas fa-lock-open mr-1"></i> Mode Admin
                                </span>` : `
                                <span class="hidden sm:inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-amber-50 text-amber-700">
                                    <i class="fas fa-eye mr-1"></i> Mode Lihat-Saja
                                </span>`}
                                <span class="hidden sm:inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-emerald-50 text-emerald-700">
                                    <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full mr-1.5 ${isSyncing ? 'animate-ping' : 'animate-pulse'}"></span> Cloud Terkoneksi
                                </span>
                                <button onclick="handleLogout()" class="text-slate-500 hover:text-red-600 transition-colors flex items-center text-sm font-semibold py-1.5 px-3 rounded-lg hover:bg-slate-50">
                                    <i class="fas fa-sign-out-alt mr-2"></i> Keluar
                                </button>
                            </div>
                        </header>
                        
                        <!-- Content Area -->
                        <main id="main-content" class="flex-1 overflow-x-hidden overflow-y-auto p-6"></main>
                    </div>
                `;
                navigateTo(state.currentView);
            }
        }

        function renderViewContent() {
            const contentEl = document.getElementById('main-content');
            const titleEl = document.getElementById('page-title');
            
            if (chartInstance) {
                chartInstance.destroy();
                chartInstance = null;
            }

            if (!contentEl || !titleEl) return;

            const viewTitles = {
                dashboard: 'Dashboard Utama',
                datasiswa: 'Data Siswa Buku Induk',
                dataortu: 'Data Orang Tua & Wali',
                dataakademik: 'Pengaturan Kelas & Mata Pelajaran',
                inputnilai: 'Sistem Input Nilai',
                laporan: 'Laporan Buku Induk'
            };

            titleEl.innerText = viewTitles[state.currentView] || 'Aplikasi';

            switch (state.currentView) {
                case 'dashboard':
                    renderDashboard(contentEl);
                    break;
                case 'datasiswa':
                    renderDataSiswa(contentEl);
                    break;
                case 'dataortu':
                    renderDataOrtu(contentEl);
                    break;
                case 'dataakademik':
                    renderDataAkademik(contentEl);
                    break;
                case 'inputnilai':
                    renderInputNilai(contentEl);
                    break;
                case 'laporan':
                    renderLaporan(contentEl);
                    break;
            }
        }

        function renderDashboard(container) {
            const maleCount = state.siswa.filter(s => s.jk === 'L').length;
            const femaleCount = state.siswa.filter(s => s.jk === 'P').length;
            const averageGrade = state.nilai.length > 0 ? (state.nilai.reduce((acc, curr) => acc + curr.akhir, 0) / state.nilai.length).toFixed(2) : '0.00';

            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                    <div class="bg-white rounded-2xl border border-slate-100 p-6 flex items-center shadow-sm">
                        <div class="rounded-xl bg-blue-50 p-4 mr-4 text-blue-600"><i class="fas fa-user-graduate text-2xl w-8 text-center"></i></div>
                        <div>
                            <p class="text-xs text-slate-500 font-bold uppercase tracking-wider">Total Siswa</p>
                            <p class="text-2xl font-black text-slate-800">${state.siswa.length}</p>
                            <p class="text-[11px] text-slate-400 mt-0.5">${maleCount} Laki-laki | ${femaleCount} Perempuan</p>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl border border-slate-100 p-6 flex items-center shadow-sm">
                        <div class="rounded-xl bg-emerald-50 p-4 mr-4 text-emerald-600"><i class="fas fa-school text-2xl w-8 text-center"></i></div>
                        <div>
                            <p class="text-xs text-slate-500 font-bold uppercase tracking-wider">Total Kelas</p>
                            <p class="text-2xl font-black text-slate-800">${state.kelas.length}</p>
                            <p class="text-[11px] text-slate-400 mt-0.5">Ruang Kelas Terdaftar</p>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl border border-slate-100 p-6 flex items-center shadow-sm">
                        <div class="rounded-xl bg-amber-50 p-4 mr-4 text-amber-600"><i class="fas fa-star text-2xl w-8 text-center"></i></div>
                        <div>
                            <p class="text-xs text-slate-500 font-bold uppercase tracking-wider">Rata-rata Nilai</p>
                            <p class="text-2xl font-black text-slate-800">${averageGrade}</p>
                            <p class="text-[11px] text-slate-400 mt-0.5">Dari ${state.nilai.length} data nilai</p>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl border border-slate-100 p-6 flex items-center shadow-sm">
                        <div class="rounded-xl bg-purple-50 p-4 mr-4 text-purple-600"><i class="fas fa-book-open text-2xl w-8 text-center"></i></div>
                        <div>
                            <p class="text-xs text-slate-500 font-bold uppercase tracking-wider">Mata Pelajaran</p>
                            <p class="text-2xl font-black text-slate-800">${state.mapel.length}</p>
                            <p class="text-[11px] text-slate-400 mt-0.5">Mata Pelajaran Aktif</p>
                        </div>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-sm lg:col-span-2">
                        <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-4">Grafik Distribusi Siswa per Kelas</h3>
                        <div class="relative h-72 w-full"><canvas id="dashboardChart"></canvas></div>
                    </div>
                    <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-sm">
                        <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-4">Informasi Sekolah</h3>
                        <div class="space-y-4 text-sm">
                            <div class="border-b border-slate-100 pb-3">
                                <span class="block text-xs text-slate-400 font-semibold uppercase">Nama Sekolah</span>
                                <span class="font-bold text-slate-700">SMP Frater Mamasa</span>
                            </div>

        window.closeModal = function() {

        window.saveSiswa = function(e, id) {
            e.preventDefault();
            if (state.currentUser && !state.currentUser.canEdit) return;

            const nisInput = document.getElementById('nis').value;
            const namaInput = document.getElementById('nama').value;
            const kelasInput = document.getElementById('kelas').value;
            const tempatInput = document.getElementById('tempat').value;
            const tglLahirInput = document.getElementById('tglLahir').value;
            const jkInput = document.getElementById('jk').value;
            const alamatInput = document.getElementById('alamat').value;

            if(id) {
                state.siswa = state.siswa.map(s => {
                    if (s.id === id) {
                        return { ...s, nis: nisInput, nama: namaInput, kelas: kelasInput, tempat: tempatInput, tglLahir: tglLahirInput, jk: jkInput, alamat: alamatInput };
                    }
                    return s;
                });
                showNotification("Data siswa berhasil diperbarui.");
            } else {
                const newId = state.siswa.length > 0 ? Math.max(...state.siswa.map(s => s.id)) + 1 : 1;
                state.siswa.push({
                    id: newId,
                    nis: nisInput,
                    nama: namaInput,
                    kelas: kelasInput,
                    tempat: tempatInput,
                    tglLahir: tglLahirInput,
                    jk: jkInput,
                    alamat: alamatInput
                });
                showNotification("Data siswa baru telah disimpan.");
            }
            closeModal();
            saveData();
            renderViewContent();
        };

        window.saveNilai = function(e, id) {
            e.preventDefault();
            if (state.currentUser && !state.currentUser.canEdit) return;

            const idSiswa = parseInt(document.getElementById('idSiswa').value);
            const mapel = document.getElementById('mapel').value;
            const tugas = parseFloat(document.getElementById('tugas').value);
            const uts = parseFloat(document.getElementById('uts').value);
            const uas = parseFloat(document.getElementById('uas').value);
            
            // Formula Nilai Akhir: Tugas 30%, UTS 30%, UAS 40%
            const akhir = (tugas * 0.3) + (uts * 0.3) + (uas * 0.4);

            if(id) {
                state.nilai = state.nilai.map(n => {
                    if (n.id === id) {
                        return { ...n, tugas, uts, uas, akhir };
                    }
                    return n;
                });
                showNotification("Nilai siswa diperbarui.");
            } else {
                const duplicate = state.nilai.find(n => n.idSiswa === idSiswa && n.mapel === mapel);
                if (duplicate) {
                    showNotification("Nilai pelajaran tersebut sudah ada untuk siswa ini!", "error");
                    return;
                }

                const newId = state.nilai.length > 0 ? Math.max(...state.nilai.map(n => n.id)) + 1 : 1;
                state.nilai.push({ id: newId, idSiswa, mapel, tugas, uts, uas, akhir });
                showNotification("Nilai baru ditambahkan.");
            }
            closeModal();
            saveData();
            renderViewContent();
        };

        function renderLaporan(container) {
            let filterKelasLaporan = document.getElementById('filter-kelas-laporan') ? document.getElementById('filter-kelas-laporan').value : '';
            let studentsInClass = state.siswa.filter(s => filterKelasLaporan === '' ? true : s.kelas === filterKelasLaporan);
            let headerMapels = state.mapel.map(m => `<th class="py-3 px-2 border text-center text-xs font-bold text-slate-600">${m}</th>`).join('');

            let bodyRows = studentsInClass.map((s, idx) => {
                let mapelGrades = state.mapel.map(m => {
                    let gradeObj = state.nilai.find(n => n.idSiswa === s.id && n.mapel === m);
                    let finalG = gradeObj ? formatAngka(gradeObj.akhir) : '-';
                    return `<td class="py-2.5 px-2 border text-center text-xs font-mono font-medium text-slate-700">${finalG}</td>`;
                }).join('');

                return `
                    <tr class="hover:bg-slate-50">
                        <td class="py-2.5 px-3 border text-center text-xs font-medium text-slate-500">${idx+1}</td>
                        <td class="py-2.5 px-3 border text-xs font-semibold text-slate-800">${s.nis}</td>

                        ${mapelGrades}
                    </tr>
                `;
            }).join('');

            if (studentsInClass.length === 0) {
                bodyRows = `<tr><td colspan="${4 + state.mapel.length}" class="py-12 text-center text-slate-400 font-bold text-sm">Tidak ada siswa terdaftar di kelas terpilih.</td></tr>`;
            }

            container.innerHTML = `
                <div class="bg-white rounded-2xl border border-slate-100 p-6 flex flex-col h-full shadow-sm">
                    <div class="border-b border-slate-100 pb-5 mb-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4 print-hide">
                        <div class="flex items-center space-x-3">
                            <span class="text-sm font-bold text-slate-700">Pilih Kelas Laporan:</span>
                            <select id="filter-kelas-laporan" onchange="triggerFilterLaporan()" class="px-3.5 py-1.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-bold text-slate-700">
                                <option value="">Semua Kelas</option>
                                ${state.kelas.map(k => `<option value="${k}" ${filterKelasLaporan === k ? 'selected' : ''}>${k}</option>`).join('')}
                            </select>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="eksporExcel('${filterKelasLaporan}')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded-xl text-xs flex items-center shadow-md transition-all">
                                <i class="fas fa-file-excel mr-2 text-sm"></i> Ekspor ke Excel (xlsx)
                            </button>
                            <button onclick="cetakLaporan()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-xl text-xs flex items-center shadow-md transition-all">
                                <i class="fas fa-print mr-2 text-sm"></i> Cetak Laporan
                            </button>
                        </div>
                    </div>
                    
                    <!-- Print & Excel Target Content -->
                    <div id="print-area" class="overflow-x-auto border rounded-xl bg-white p-6">
                        <div class="text-center mb-6">
                            <h2 class="text-base font-bold uppercase tracking-wide text-slate-900 leading-tight">Buku Induk Kumpulan Nilai Siswa (Leger)</h2>
                            <h3 class="text-sm font-bold uppercase tracking-wider text-slate-600 mt-0.5">SMP Frater Mamasa</h3>
                            <p class="text-xs text-slate-400 mt-1">Kelas: ${filterKelasLaporan !== '' ? filterKelasLaporan : 'Semua Kelas'} | Tahun Pelajaran 2025/2026</p>
                        </div>
                        <table class="w-full text-left border-collapse border border-slate-200">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200 text-xs text-slate-600">
                                    <th class="py-3 px-3 border text-center font-bold w-12">No</th>
                                    <th class="py-3 px-3 border font-bold w-28">NIS</th>
                                    <th class="py-3 px-3 border font-bold">Nama Lengkap</th>
                                    <th class="py-3 px-3 border text-center font-bold w-20">Kelas</th>
                                    ${headerMapels}
                                </tr>
                            </thead>
                            <tbody>${bodyRows}</tbody>
                        </table>
                        <div class="mt-8 flex justify-end text-sm text-slate-600 font-medium">
                            <div class="text-center">
                                <p>Mamasa, ${new Date().toLocaleDateString('id-ID', {year: 'numeric', month: 'long', day: 'numeric'})}</p>
                                <p class="mt-1">Kepala Sekolah SMP Frater Mamasa</p>
                                <div class="h-16"></div>
                                <p class="font-bold underline text-slate-800">Fr. Yoseph, S.Pd.</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        window.triggerFilterLaporan = function() {
            renderViewContent();
        };

        window.cetakLaporan = function() {
            window.print();
        };

        window.eksporExcel = function(kelasFilter) {
            let dataList = [];
            const targetedSiswa = state.siswa.filter(s => kelasFilter === '' ? true : s.kelas === kelasFilter);

            targetedSiswa.forEach((s, idx) => {
                let row = {
                    "No": idx + 1,
                    "NIS": s.nis,
                    "Nama Siswa": s.nama,
                    "Kelas": s.kelas
                };

                state.mapel.forEach(m => {
                    let val = state.nilai.find(n => n.idSiswa === s.id && n.mapel === m);
                    row[m] = val ? parseFloat(val.akhir.toFixed(2)) : '-';
                });

                dataList.push(row);
            });

            const worksheet = XLSX.utils.json_to_sheet(dataList);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Leger Nilai");
            
            const fName = `Leger_Buku_Induk_${kelasFilter !== '' ? kelasFilter.replace(' ', '_') : 'Semua_Kelas'}.xlsx`;
            XLSX.writeFile(workbook, fName);
            showNotification("Berhasil mengekspor data ke Excel.");
        };

        window.onload = function() {
            initAuthentication();
        };
    </script>
</body>
</html>
